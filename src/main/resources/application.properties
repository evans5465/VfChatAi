# Server Configuration
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate Configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# Flyway migration (optional, for version control of database schema)
spring.flyway.enabled=false

# Email Service Configuration (Mock by default)
email.service.provider=mock
email.from.address=noreply@vfchatai.com
email.from.name=VFChatAI
email.retry.attempts=3
email.timeout.seconds=30

# SMS Service Configuration (Mock by default)
sms.service.provider=mock
sms.from.number=+1234567890
sms.retry.attempts=3
sms.timeout.seconds=30

# Verification Settings
verification.code.length=6
verification.code.expiry.minutes=15
verification.max.attempts=5
verification.resend.cooldown.seconds=60

# Security Settings
app.security.max-login-attempts=5
app.security.account-lockout-duration=30
app.security.session-timeout=30

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://localhost:3001
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=false

# Application Info
app.version=1.0.0
app.description=AI-Powered Chat Application

# Logging Configuration
logging.level.com.example.VF_ChatAi=INFO
logging.level.org.springframework.web=ERROR
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Actuator (for monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized